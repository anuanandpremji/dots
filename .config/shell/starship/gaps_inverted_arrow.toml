format = """
$cmd_duration\
$os\
$username\
$directory\
$git_branch\
$git_commit\
$git_status\
$python\
$docker_context\
\r
$character\
"""

#add_newline = false

[line_break]
disabled = false

[os]
style = "bg:blue bold fg:#ffffff"
disabled = false # Disabled by default

# This is the default symbols table.
[os.symbols]
Debian = "´îå "
Fedora = "´îè "
Macos = "´îé "
Ubuntu = "´îø "
Unknown = "ÔØô "
Windows = "´à║ "

[username]
show_always = true
style_user = "bg:blue bold fg:#ffffff"
style_root = "bg:blue bold fg:#ffffff"
format = '[$user]($style)[¯é░](fg:blue)'
disabled = false

[directory]
style = "bg:#f4d03f bold fg:#000000"
read_only = "´Çú"
format = '[¯âù](fg:#f4d03f)[ $read_only ]($style)[$path ]($style)[¯é░](fg:#f4d03f)'
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "ÔÇª/"

[git_branch]
symbol = "´Éÿ"
style = "bg:cyan bold fg:#ffffff"
format = '[¯âù](fg:cyan)[ $symbol $branch ]($style)'

[git_commit]
format = '[($hash$tag)]($style)'
style = "bg:cyan bold fg:#ffffff"
only_detached = true

[git_status]
style = "bg:cyan bold fg:#ffffff"
format = '[ $stashed]($style)[¯é░](fg:cyan)'

[python]
symbol = " ¯ÿå "
style = "bg:#4c566a bold fg:#ffffff"
format = '[¯âù](fg:#4c566a)[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)[¯é░](fg:#4c566a)'

[docker_context]
symbol = "´îê "
style = "bg:#5e81ac"
format = '[¯âù](fg:#4c566a)[ $symbol $context ]($style) $path [¯é░](fg:4c566a)'

[c]
symbol = "¯ÿ× "
style = "bg:#4c566a bold fg:#ffffff"
format = '[¯âù](fg:#4c566a)[ $symbol ($version) ]($style)[¯é░](fg:#4c566a)'

[rust]
symbol = "¯×¿"
style = "bg:cyan"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#6272a4 bold fg:#ffffff"
format = '[¯âù](fg:#6272a4)[ ´É║ $time ]($style)[¯é░](fg:#6272a4)'

[character]
success_symbol = '[ÔØ»](#6272a4)'
error_symbol = '[ÔØ»](bold red)'
#style = "bg:#6272a4"

[cmd_duration]
min_time = 1000 # Milliseconds
format = "Took [$duration](#6272a4)\n\n"
